server:
  port: 2137
spring:
  application:
    name: chessarbiter-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/chessarbiter}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
app:
  security:
    cookie-name: chessarbiter_session
    cookie-secure: false
    jwt-secret: ${AUTH_SECRET:${SESSION_SECRET:}}
    jwt-expiration: 168h
  cors:
    allowed-origins:
      - http://localhost:2137
