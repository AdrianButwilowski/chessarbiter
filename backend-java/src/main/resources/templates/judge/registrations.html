<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Zgłoszenia')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="page"><div class="container">
  <header class="page-header"><p class="eyebrow">Panel sędziego</p><h1 th:text="${'Zgłoszenia: ' + tournament.title}"></h1><p class="lead">Zarządzaj listą startową i rezerwową.</p></header>
  <nav th:replace="~{fragments/layout :: management-nav(${tournament}, 'registrations')}"></nav>
  <div th:replace="~{fragments/layout :: messages}"></div>
  <div class="alert alert-warning" th:if="${registrationsLocked}">Turniej jest zakończony. Operacje na zgłoszeniach są niedostępne.</div>
  <div class="cluster mb-2"><a class="btn" th:href="@{/panel-sedziego/turnieje/{id}/zgloszenia.csv(id=${tournament.id})}">Eksport CSV</a></div>
  <section class="card"><div class="card-header"><h2 class="card-title">Lista zgłoszeń</h2></div><div class="card-body">
    <form class="cluster mb-2" method="get">
      <input style="max-width:320px" name="q" placeholder="Szukaj zawodnika" th:value="${q}">
      <select style="max-width:220px" name="status"><option value="">Każdy status</option><option th:each="status : ${registrationStatuses}" th:value="${status}" th:text="${@view.registrationStatus(status)}" th:selected="${status == selectedStatus}"></option></select>
      <button class="btn" type="submit">Filtruj</button>
    </form>
    <div class="table-wrap" th:if="${!#lists.isEmpty(registrations)}"><table>
      <thead><tr><th>Zawodnik</th><th>E-mail</th><th>Klub / miasto</th><th>Ranking</th><th>Kategoria</th><th>Uwagi</th><th>Status</th><th th:unless="${registrationsLocked}">Akcje</th></tr></thead>
      <tbody><tr th:each="registration : ${registrations}">
        <td><a class="link" th:href="@{/turnieje/{slug}/zawodnicy/{id}(slug=${tournament.slug},id=${registration.id})}" th:text="${registration.firstName + ' ' + registration.lastName}"></a></td>
        <td th:text="${registration.email}"></td><td th:text="${registration.clubOrCity}"></td><td th:text="${registration.rating}"></td><td th:text="${@view.category(registration.chessCategory)}"></td><td th:text="${registration.notes ?: 'Brak uwag'}"></td>
        <td><span class="badge" th:text="${@view.registrationStatus(registration.status)}"></span></td>
        <td class="actions-cell" th:unless="${registrationsLocked}"><div class="cluster">
          <form th:if="${registration.status.name() != 'REGISTERED'}" method="post" th:action="@{/panel-sedziego/turnieje/{id}/zgloszenia/{registrationId}/status(id=${tournament.id},registrationId=${registration.id})}"><input type="hidden" name="status" value="REGISTERED"><button class="btn btn-small" type="submit">Przyjmij</button></form>
          <form th:if="${registration.status.name() != 'WAITLIST'}" method="post" th:action="@{/panel-sedziego/turnieje/{id}/zgloszenia/{registrationId}/status(id=${tournament.id},registrationId=${registration.id})}"><input type="hidden" name="status" value="WAITLIST"><button class="btn btn-small btn-outline" type="submit">Rezerwa</button></form>
          <form th:if="${registration.status.name() != 'CANCELLED'}" method="post" th:action="@{/panel-sedziego/turnieje/{id}/zgloszenia/{registrationId}/status(id=${tournament.id},registrationId=${registration.id})}"><input type="hidden" name="status" value="CANCELLED"><button class="btn btn-small btn-danger" type="submit">Anuluj</button></form>
        </div></td>
      </tr></tbody>
    </table></div>
    <div class="empty" th:if="${#lists.isEmpty(registrations)}">Brak zgłoszeń.</div>
  </div></section>
</div></main>
</body></html>
