<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Wyniki')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="page"><div class="container">
  <header class="page-header"><p class="eyebrow">Turniej</p><h1 th:text="${'Wyniki: ' + tournament.title}"></h1></header>
  <nav th:replace="~{fragments/layout :: public-nav(${tournament}, 'results')}"></nav>
  <section class="card mb-2">
    <div class="card-header"><h2 class="card-title">Tabela wyników</h2></div>
    <div class="card-body" th:replace="~{fragments/tables :: standings(${standings}, ${'/turnieje/' + tournament.slug + '/zawodnicy'})}"></div>
  </section>
  <section class="card">
    <div class="card-header"><h2 class="card-title">Rundy</h2></div>
    <div class="card-body cluster">
      <a class="btn btn-outline btn-small" th:each="round : ${rounds}" th:href="@{/turnieje/{slug}/rundy/{number}(slug=${tournament.slug},number=${round.roundNumber})}" th:text="${'Runda ' + round.roundNumber}"></a>
      <span class="muted" th:if="${#lists.isEmpty(rounds)}">Nie rozegrano jeszcze rund.</span>
    </div>
  </section>
</div></main>
</body></html>
