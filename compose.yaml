services:
  postgres:
    image: postgres:16
    container_name: chessarbiter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chessarbiter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - chessarbiter-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chessarbiter"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  chessarbiter-postgres-data:
